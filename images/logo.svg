<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
  </defs>

  <!-- Envelope Icon -->
  <g transform="translate(20, 35)">
    <rect x="5" y="15" width="90" height="65" rx="10" ry="10" fill="url(#iconGrad)" opacity="0.12"/>
    <path d="M10 22 L50 52 L90 22" stroke="url(#iconGrad)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 22 L10 78 L90 78 L90 22" stroke="url(#iconGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 78 L38 52" stroke="url(#iconGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 78 L62 52" stroke="url(#iconGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Envelope flap detail -->
    <polygon points="10,22 50,48 90,22" fill="url(#iconGrad)" opacity="0.08"/>
  </g>

  <!-- InboxLocal Text -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="#1F2937" letter-spacing="-1.5">
    Inbox
    <tspan fill="url(#brandGrad)">Local</tspan>
  </text>

  <!-- Tagline -->
  <text x="132" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280" letter-spacing="0.3">
    Done-for-You Email Newsletters
  </text>

  <!-- Dot accent -->
  <circle cx="130" cy="80" r="3" fill="url(#brandGrad)" opacity="0.5"/>
</svg>